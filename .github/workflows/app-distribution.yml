name: App Distribution

on:
  workflow_dispatch:
    inputs:
      wrapper_version:
        type: string
        required: true
        default: '0.1.0'
        description: JitPack tag of com.github.vrtx-fintech:vrtx-android to consume
      environment:
        type: choice
        required: true
        default: sandbox
        description: Target environment for app distribution
        options:
          - sandbox
          - staging
      release_notes:
        type: string
        required: true
        default: Manual Debug Build
        description: Release notes for the distribution

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  distribute:
    name: Build & Distribute
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@651bceb6f9ca583f16b8d75b62c36ded2ae6fc9c # v4.0.0

      - name: Install Android SDK packages
        shell: bash
        run: |
          if [ ! -f "${ANDROID_SDK_ROOT}/licenses/android-sdk-license" ]; then
            yes | sdkmanager --licenses >/dev/null || true
          fi
          sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Build release APK against JitPack-published wrapper
        shell: bash
        env:
          VRTX_CLIENT_ID: ${{ secrets.VRTX_CLIENT_ID }}
          VRTX_CLIENT_SECRET: ${{ secrets.VRTX_CLIENT_SECRET }}
          VRTX_ENVIRONMENT: ${{ inputs.environment }}
          WRAPPER_VERSION: ${{ inputs.wrapper_version }}
        run: ./gradlew -p example :app:assembleRelease -PwrapperVersion=$WRAPPER_VERSION --no-daemon --build-cache

      - name: Install Firebase CLI
        shell: bash
        run: npm install -g firebase-tools@15.12.0

      - name: Authenticate to Firebase
        shell: bash
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          KEY_FILE=$(mktemp)
          chmod 600 "${KEY_FILE}"
          printf '%s' "${FIREBASE_KEY}" > "${KEY_FILE}"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${KEY_FILE}" >> "${GITHUB_ENV}"

      - name: Distribute APK to Firebase
        shell: bash
        env:
          SANDBOX_APP_ID: ${{ secrets.SANDBOX_FIREBASE_APP_ID }}
          STAGING_APP_ID: ${{ secrets.STAGING_FIREBASE_APP_ID }}
          ENVIRONMENT: ${{ inputs.environment }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          if [[ "${ENVIRONMENT}" == "sandbox" ]]; then
            APP_ID="${SANDBOX_APP_ID}"
          else
            APP_ID="${STAGING_APP_ID}"
          fi
          NOTES_FILE=$(mktemp)
          printf '%s' "${RELEASE_NOTES}" > "${NOTES_FILE}"
          firebase appdistribution:distribute example/app/build/outputs/apk/release/app-release.apk \
            --app "${APP_ID}" \
            --release-notes-file "${NOTES_FILE}" \
            --testers-file example/testers.txt

      - name: Clean up credentials
        if: ${{ success() || failure() }}
        shell: bash
        run: |
          [ -f "${GOOGLE_APPLICATION_CREDENTIALS}" ] && rm -f "${GOOGLE_APPLICATION_CREDENTIALS}" || true
