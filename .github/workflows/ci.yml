name: CI

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and publish to mavenLocal
        env:
          # PAT with read:packages scope for the private sa.vrtx:sdk artifact
          # hosted on vrtx-fintech/vrtx-sdk-android GitHub Packages. Configure
          # these in repo Settings → Secrets and variables → Actions.
          GITHUB_USER: ${{ secrets.GH_PACKAGES_USER }}
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: ./gradlew publishToMavenLocal
