name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'SDK version to publish'
        required: true
        default: '0.1.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and publish to mavenLocal
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          SDK_VERSION: ${{ inputs.version || '0.1.0' }}
        run: ./gradlew publishToMavenLocal -PsdkVersion=$SDK_VERSION
