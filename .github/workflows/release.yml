name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
        default: '0.0.0-test'
        description: Version to build and publish to Maven Central

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      SDK_VERSION: ${{ github.event.inputs.version }}
      ARTIFACT_DIR_REL: io/github/abdel-monaam-aouini/vrtx-android
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@651bceb6f9ca583f16b8d75b62c36ded2ae6fc9c # v4.0.0

      - name: Install Android SDK packages
        shell: bash
        run: |
          if [ ! -f "${ANDROID_SDK_ROOT}/licenses/android-sdk-license" ]; then
            yes | sdkmanager --licenses >/dev/null || true
          fi
          sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Build artifacts
        shell: bash
        run: ./gradlew publishToMavenLocal -PsdkVersion=$SDK_VERSION --no-daemon

      - name: Sign artifacts and upload to Central Portal
        shell: bash
        env:
          GPG_KEY: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEY }}
          GPG_PASSPHRASE: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYPASSWORD }}
          CENTRAL_USERNAME: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
        run: |
          set -euo pipefail
          ARTIFACT_DIR="${HOME}/.m2/repository/${ARTIFACT_DIR_REL}/${SDK_VERSION}"

          # Import the secret key.
          echo "$GPG_KEY" | gpg --batch --import

          # Sign every release artifact and write md5/sha1 sidecars.
          # Skip Maven's local-only metadata and any pre-existing checksums.
          cd "$ARTIFACT_DIR"
          for f in *; do
            case "$f" in
              *.asc|*.md5|*.sha1|maven-metadata*.xml) continue ;;
            esac
            echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback \
              --passphrase-fd 0 --detach-sign --armor "$f"
            md5sum "$f"  | cut -d' ' -f1 > "$f.md5"
            sha1sum "$f" | cut -d' ' -f1 > "$f.sha1"
          done

          # Build the deployment bundle. Paths inside the zip must mirror
          # the groupId/artifactId/version layout Central expects.
          BUNDLE="${RUNNER_TEMP}/bundle-${SDK_VERSION}.zip"
          (cd "${HOME}/.m2/repository" && zip -r "$BUNDLE" "${ARTIFACT_DIR_REL}/${SDK_VERSION}")

          # Upload as a USER_MANAGED deployment — sits on the Central Portal
          # as a draft until you click Publish (or drop it).
          AUTH=$(printf '%s:%s' "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 -w0)
          HTTP_CODE=$(curl -sS -o "${RUNNER_TEMP}/upload-response.txt" -w "%{http_code}" \
            -X POST \
            -H "Authorization: UserToken $AUTH" \
            -F "bundle=@${BUNDLE}" \
            "https://central.sonatype.com/api/v1/publisher/upload?name=vrtx-android-${SDK_VERSION}&publishingType=USER_MANAGED")
          echo "Upload HTTP $HTTP_CODE"
          cat "${RUNNER_TEMP}/upload-response.txt"
          [ "$HTTP_CODE" = "201" ]

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$SDK_VERSION" \
            --title "Release $SDK_VERSION" \
            --generate-notes
