name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
        default: '0.0.0-test'
        description: Version to build and publish to Maven Central
  pull_request:
    paths:
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'wrapper-src/**'
      - '.github/workflows/release.yml'

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYID }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYPASSWORD }}
      SDK_VERSION: ${{ github.event.inputs.version || format('0.0.0-pr{0}', github.event.pull_request.number) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@651bceb6f9ca583f16b8d75b62c36ded2ae6fc9c # v4.0.0

      - name: Install Android SDK packages
        shell: bash
        run: |
          if [ ! -f "${ANDROID_SDK_ROOT}/licenses/android-sdk-license" ]; then
            yes | sdkmanager --licenses >/dev/null || true
          fi
          sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Dry-run publish (PR)
        if: github.event_name == 'pull_request'
        shell: bash
        run: ./gradlew publishToMavenLocal -PsdkVersion=$SDK_VERSION --no-daemon

      - name: Inspect generated artifacts (PR)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          ARTIFACT_DIR="${HOME}/.m2/repository/io/github/abdel-monaam-aouini/vrtx-android/${SDK_VERSION}"
          echo "## Artifacts produced" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh "$ARTIFACT_DIR" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "## POM" >> $GITHUB_STEP_SUMMARY
          echo '```xml' >> $GITHUB_STEP_SUMMARY
          cat "$ARTIFACT_DIR/vrtx-android-${SDK_VERSION}.pom" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Publish to Maven Central
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: ./gradlew publishToMavenCentral -PsdkVersion=$SDK_VERSION --no-daemon

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$SDK_VERSION" \
            --title "Release $SDK_VERSION" \
            --generate-notes
