name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
        default: '0.0.0-test'
        description: Version to build, publish, and attach to a GitHub Release

permissions:
  contents: write

concurrency:
  group: release-0.1.1
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@651bceb6f9ca583f16b8d75b62c36ded2ae6fc9c # v4.0.0

      - name: Install Android SDK packages
        shell: bash
        run: |
          if [ ! -f "${ANDROID_SDK_ROOT}/licenses/android-sdk-license" ]; then
            yes | sdkmanager --licenses >/dev/null || true
          fi
          sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Publish wrapper to mavenLocal
        shell: bash
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          SDK_VERSION: '0.1.1'
        run: ./gradlew publishToMavenLocal -PsdkVersion=$SDK_VERSION --no-daemon

      - name: Create GitHub Release with AAR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SDK_VERSION: '0.1.1'
        run: |
          ARTIFACT_DIR="${HOME}/.m2/repository/com/github/vrtx-fintech/vrtx-android/${SDK_VERSION}"
          gh release create "${SDK_VERSION}" \
            --title "Release ${SDK_VERSION}" \
            --generate-notes \
            "${ARTIFACT_DIR}/vrtx-android-${SDK_VERSION}.aar" \
            "${ARTIFACT_DIR}/vrtx-android-${SDK_VERSION}.pom" \
            "${ARTIFACT_DIR}/vrtx-android-${SDK_VERSION}.module"
